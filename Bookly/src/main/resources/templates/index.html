<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Reviews</title>
     <script th:src="@{/bookscript.js}"></script>
     <link rel="stylesheet" href="style.css">
</head>
<body>

     <h1>Welcome to Bookly</h1>

    <h2>Books</h2>
    <ul>
        <li th:each="b : ${books}">

    <img th:src="${b.imageUrl}"
         alt="Book Cover"
         width="120">

    <br>

    <a href="#"
       th:onclick="'getBook(' + ${b.id} + ')'"
       th:text="${b.title}">
    </a> <br />

    <a th:href="@{'/editBook/' + ${b.id}}">
        Edit
    </a>

    <form th:action="@{'/deleteBook/' + ${b.id}}" method="post">
        <button type="submit">Delete Book</button>
    </form>

</li>
    </ul>

    <h2>Add Book</h2>
    <form th:action="@{/saveBook}" method="post">
        <p>
            Title: <input type="text" name="title">
        </p>
        <p>
            Authors: <input type="text" name="authors">
        </p>
        
        <p>
    		Cover Image URL: <input type="text" name="imageUrl" placeholder="https://example.com/book-cover.jpg">
		</p>
		
        <button type="submit">Add Book</button>
    </form>

    <hr>

    <div id="bookdetails"></div>
</body>
</html>
